<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balcão Virtual</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">
  <h1>Prefeitura Municipal de Cabo Frio</h1>
  <h2>Secretaria Municipal de Educação</h2>
  <p>Teleatendimento oficial</p>

  <form id="formAtendimento">
    <input type="text" name="nome" placeholder="Seu nome" required>
    <input type="email" name="email" placeholder="Seu e-mail" required>
    <textarea name="assunto" placeholder="Descreva o atendimento" required></textarea>
    <button type="submit">Entrar na fila</button>
  </form>

  <div id="status" class="hidden">
    ⏳ Você entrou na fila de atendimento.<br>
    Aguarde receber o link da reunião por e-mail.
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
